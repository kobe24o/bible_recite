name: Cloud plan publisher release

on:
  workflow_dispatch:
  push:
    tags:
      - "cloud-plan-publisher-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            binary: cloud-plan-publisher-windows-x64.exe
            archive: cloud-plan-publisher-windows-x64.zip
          - name: macOS runner architecture
            os: macos-latest
            binary: cloud-plan-publisher-macos
            archive: cloud-plan-publisher-macos.tar.gz
          - name: Linux x64
            os: ubuntu-latest
            binary: cloud-plan-publisher-linux-x64
            archive: cloud-plan-publisher-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Compile executable
        shell: bash
        run: >-
          dart compile exe tool/cloud_plan/bin/publish_feishu_export.dart
          -o "dist/${{ matrix.binary }}"
      - name: Archive Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          Compress-Archive
          -Path "dist/${{ matrix.binary }}"
          -DestinationPath "dist/${{ matrix.archive }}"
      - name: Archive Unix executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "dist/${{ matrix.binary }}"
          tar -czf "dist/${{ matrix.archive }}" -C dist "${{ matrix.binary }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
